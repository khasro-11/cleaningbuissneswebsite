    <!-- Sparkle -->
    <g transform="translate(100, 22)">
      <path d="M0 -10 L1.6 -1.6 L10 0 L1.6 1.6 L0 10 L-1.6 1.6 L-10 0 L-1.6 -1.6 Z" fill="#7fb3d5"/>
