    <rect x="128" y="80" width="42" height="100" rx="2" fill="#0e1f33"/>
    <!-- Window strips left -->
    <rect x="34" y="92"  width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="34" y="104" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="34" y="116" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="34" y="128" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="34" y="140" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="34" y="152" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="34" y="164" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <!-- Window strips right -->
    <rect x="132" y="92"  width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="132" y="104" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="132" y="116" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="132" y="128" width="34" height="3" fill="#ffffff" opacity="0.45"/>
    <rect x="132" y="140" width="34" height="3" fill="#ffffff" opacity="0.45"/>
