  <!-- Wordmark -->
  <text x="88" y="38" font-family="Manrope, system-ui, sans-serif" font-weight="800" font-size="28" letter-spacing="-1" fill="#0e1f33">Nordiva<tspan fill="#1f3a5f" font-weight="600"> Clean</tspan></text>
  <!-- Subtitle -->
  <text x="89" y="57" font-family="Manrope, system-ui, sans-serif" font-weight="600" font-size="9.5" letter-spacing="2" fill="#0e1f33" opacity="0.5">GEBÄUDESERVICE · BÖNEN</text>
